# =============================================================================
# LLARS GitLab CI/CD Pipeline
# =============================================================================
# Vollautomatisierte Pipeline für Test, Build und Deployment
#
# Stages:
#   1. lint      - Code-Qualität prüfen
#   2. test      - Unit & Integration Tests
#   3. security  - Security/Route Protection Checks
#   4. build     - Docker Images bauen
#   5. deploy    - Deployment auf Server
#   6. smoke     - Smoke Tests (inkl. Wizard-Workflow)
#   7. rollback  - Rollback (manuell oder via Smoke-Fail)
#
# Voraussetzungen (GitLab CI/CD Variables):
#   - SSH_PRIVATE_KEY: Private Key für SSH Zugang zum Server
#   - SSH_KNOWN_HOSTS: Known Hosts Eintrag des Servers
#   - LLARS_SERVER_HOST: Hostname/IP des LLARS Servers
#   - LLARS_SERVER_USER: SSH Username (default: llars)
#   - LLARS_DEPLOY_PATH: Pfad zum LLARS Projekt auf dem Server
#   - DEPLOY_TOKEN: (Optional) Für private Registry
#
# =============================================================================

stages:
  - lint
  - test
  - security
  - build
  - deploy
  - smoke
  - rollback

# =============================================================================
# GLOBALE KONFIGURATION
# =============================================================================

# Optional test-only switches (set one to run only that job)
# - UNIT_BACKEND_ONLY
# - UNIT_FRONTEND_ONLY
# - INTEGRATION_ONLY
# - E2E tests are currently disabled in CI

variables:
  # Python
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONUNBUFFERED: "1"

  # Node.js
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"

  # Docker
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_IMAGE_TAG: $CI_COMMIT_SHORT_SHA

  # Deployment (Server: 141.75.150.128)
  LLARS_SERVER_USER: "master"
  LLARS_DEPLOY_PATH: "/var/llars"

# Cache für schnellere Builds
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .cache/pip
    - .cache/npm
    - llars-frontend/node_modules/

# Standard before_script für SSH Setup (Alpine Linux)
.ssh_setup: &ssh_setup
  before_script:
    - 'command -v ssh-agent >/dev/null || apk add --no-cache openssh-client'
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts

# Shared rule to skip non-test jobs when a test-only switch is set
.test_only_skip: &test_only_skip
  if: '$UNIT_BACKEND_ONLY || $UNIT_FRONTEND_ONLY || $INTEGRATION_ONLY'
  when: never

# =============================================================================
# STAGE 1: LINT
# =============================================================================

lint:backend:
  stage: lint
  image: python:3.11-slim
  script:
    - pip install flake8 black isort
    - echo "Checking Python code style..."
    - flake8 app/
    - black --check app/ --line-length=120 || true
    - isort --check-only app/ || true
  rules:
    - *test_only_skip
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

lint:frontend:
  stage: lint
  image: node:20-alpine
  script:
    - cd llars-frontend
    - npm ci --prefer-offline
    - echo "Checking Frontend code style..."
    - npm run lint || true
  rules:
    - *test_only_skip
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

# =============================================================================
# STAGE 2: TEST
# =============================================================================

test:unit:backend:
  stage: test
  image: python:3.11-slim
  services:
    - name: mariadb:11.2
      alias: test-db
      variables:
        MYSQL_ROOT_PASSWORD: test
        MYSQL_DATABASE: llars_test
        MYSQL_USER: test
        MYSQL_PASSWORD: test
  variables:
    DATABASE_URL: "mysql://test:test@test-db:3306/llars_test"
    TESTING: "true"
    AUTHENTIK_DISABLED: "true"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends build-essential libffi-dev libssl-dev pkg-config
    - pip install --upgrade pip
  script:
    # Use lightweight test requirements (excludes torch/flair/transformers ~3GB)
    - pip install -r app/requirements-test.txt
    - echo "Running Backend Unit Tests..."
    - pytest tests/unit/ -v --cov=app --cov-report=xml --cov-report=term-missing
  coverage: '/TOTAL.*\s+(\d+%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 week
  rules:
    - if: '$UNIT_BACKEND_ONLY'
    - if: '$UNIT_FRONTEND_ONLY || $INTEGRATION_ONLY'
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

test:unit:frontend:
  stage: test
  image: node:20-alpine
  script:
    - cd llars-frontend
    - npm ci --prefer-offline
    - echo "Running Frontend Unit Tests..."
    - npm run test:run -- --coverage
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: llars-frontend/coverage/cobertura-coverage.xml
    expire_in: 1 week
  rules:
    - if: '$UNIT_FRONTEND_ONLY'
    - if: '$UNIT_BACKEND_ONLY || $INTEGRATION_ONLY'
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

test:integration:
  stage: test
  image: python:3.11-slim
  services:
    - name: mariadb:11.2
      alias: test-db
      variables:
        MYSQL_ROOT_PASSWORD: test
        MYSQL_DATABASE: llars_test
        MYSQL_USER: test
        MYSQL_PASSWORD: test
    - name: redis:7-alpine
      alias: test-redis
  variables:
    DATABASE_URL: "mysql://test:test@test-db:3306/llars_test"
    REDIS_URL: "redis://test-redis:6379"
    TESTING: "true"
    AUTHENTIK_DISABLED: "true"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends build-essential libffi-dev libssl-dev pkg-config
    - pip install --upgrade pip
  script:
    # Use lightweight test requirements (excludes torch/flair/transformers ~3GB)
    - pip install -r app/requirements-test.txt
    - echo "Running Integration Tests..."
    - pytest tests/integration/ -v
  rules:
    - if: '$INTEGRATION_ONLY'
    - if: '$UNIT_BACKEND_ONLY || $UNIT_FRONTEND_ONLY'
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
  needs:
    - job: test:unit:backend
      optional: true

# E2E Tests laufen gegen eine frische CI-Umgebung (Docker Compose im Job)
# Dies stellt sicher, dass die Tests den aktuellen Code prüfen
test:e2e:
  stage: test
  image: docker:24
  variables:
    COMPOSE_PROJECT_NAME: "llars-ci"
    LLARS_SKIP_STARTUP_TASKS: "true"
  script:
    - echo "Running E2E Tests against fresh LLARS instance..."
    - |
      cat > .env <<'EOF'
      PROJECT_STATE=development
      PROJECT_URL=http://llars_ci_frontend_service:5173
      PROJECT_HOST=llars_ci_frontend_service
      NGINX_EXTERNAL_PORT=55081
      AUTHENTIK_EXTERNAL_PORT=55096
      DB_EXTERNAL_PORT=55307
      VITE_API_BASE_URL=http://llars_ci_flask_service:8081
      LLARS_ADMIN_PASSWORD=admin123
      AUTHENTIK_BOOTSTRAP_PASSWORD=admin123
      AUTHENTIK_BOOTSTRAP_EMAIL=admin@example.com
      AUTHENTIK_API_TOKEN=llars-dev-api-token-do-not-use-in-production
      EOF
    - set -a
    - . ./.env
    - set +a
    - export E2E_TEST_PASSWORD="$(awk -F= '/^LLARS_ADMIN_PASSWORD=/{print substr($0,index($0,"=")+1); exit}' .env | tr -d '\r')"
    - docker compose -f docker-compose.yml -f docker-compose.ci.yml --env-file .env up -d --build backend-flask-service db-maria-service llars-redis authentik-db authentik-redis authentik-server authentik-worker backend-supervisor-service frontend-vue-service yjs-service
    - |
      export BACKEND_IP="$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' llars_ci_flask_service)"
      export FRONTEND_IP="$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' llars_ci_frontend_service)"
      if [ -z "$BACKEND_IP" ] || [ -z "$FRONTEND_IP" ]; then
        echo "Failed to resolve container IPs (backend=$BACKEND_IP, frontend=$FRONTEND_IP)"
        docker compose ps
        exit 1
      fi
      echo "Backend IP: $BACKEND_IP"
      echo "Frontend IP: $FRONTEND_IP"
    - |
      echo "Waiting for Authentik server to be healthy..."
      READY=false
      for i in $(seq 1 60); do
        status=$(docker inspect -f '{{.State.Health.Status}}' llars_ci_authentik_server 2>/dev/null || true)
        if [ "$status" = "healthy" ]; then
          READY=true
          echo "Authentik server healthy."
          break
        fi
        echo "Authentik not healthy yet ($i/60)..."
        sleep 5
      done
      if [ "$READY" != "true" ]; then
        echo "Authentik server did not become healthy."
        docker logs llars_ci_authentik_server || true
        exit 1
      fi
    - |
      echo "Waiting for Authentik shell to be ready..."
      SHELL_READY=false
      for i in $(seq 1 120); do
        if docker exec llars_ci_authentik_server bash -lc "/ak-root/venv/bin/python -m manage shell -c \"from django.db import connections; connections['default'].ensure_connection(); from authentik.core.models import User; User.objects.count()\""; then
          SHELL_READY=true
          echo "Authentik shell ready."
          break
        fi
        echo "Authentik shell not ready yet ($i/120)..."
        sleep 5
      done
      if [ "$SHELL_READY" != "true" ]; then
        echo "Authentik shell did not become ready."
        docker logs llars_ci_authentik_server || true
        exit 1
      fi
    - |
      echo "Running Authentik init script..."
      docker cp docker/authentik/init-authentik.sh llars_ci_authentik_server:/tmp/init-authentik.sh
      docker exec \
        -e AUTHENTIK_BACKEND_CLIENT_ID=llars-backend \
        -e AUTHENTIK_BACKEND_CLIENT_SECRET=llars-backend-secret-change-in-production \
        -e AUTHENTIK_MATOMO_CLIENT_ID=llars-matomo \
        -e AUTHENTIK_MATOMO_CLIENT_SECRET=llars-matomo-secret-change-in-production \
        -e AUTHENTIK_MATOMO_APP_SLUG=llars-matomo \
        -e LLARS_ADMIN_PASSWORD="${LLARS_ADMIN_PASSWORD}" \
        -e AUTHENTIK_BOOTSTRAP_PASSWORD="${AUTHENTIK_BOOTSTRAP_PASSWORD}" \
        -e AUTHENTIK_BOOTSTRAP_EMAIL="${AUTHENTIK_BOOTSTRAP_EMAIL}" \
        -e PROJECT_STATE="${PROJECT_STATE}" \
        -e PROJECT_URL="${PROJECT_URL}" \
        -e PROJECT_HOST="${PROJECT_HOST}" \
        -e NGINX_EXTERNAL_PORT="${NGINX_EXTERNAL_PORT}" \
        -e AUTHENTIK_API_TOKEN="${AUTHENTIK_API_TOKEN}" \
        llars_ci_authentik_server bash /tmp/init-authentik.sh
    - |
      echo "Waiting for services to be healthy..."
      READY=false
      for i in $(seq 1 60); do
        if docker run --rm --network "${COMPOSE_PROJECT_NAME}_default" --entrypoint sh curlimages/curl:8.10.0 \
          -c "curl -fsS http://${BACKEND_IP}:8081/auth/health_check >/dev/null && curl -fsS http://${BACKEND_IP}:8081/auth/authentik/health_check >/dev/null && curl -fsS http://${FRONTEND_IP}:5173/login >/dev/null"; then
          READY=true
          echo "Health checks OK."
          break
        fi
        backend_status=$(docker inspect -f '{{.State.Status}}' llars_ci_flask_service 2>/dev/null || true)
        if [ "$backend_status" = "exited" ] || [ "$backend_status" = "dead" ]; then
          echo "Backend container status: $backend_status"
          docker logs --tail 200 llars_ci_flask_service || true
          docker compose ps
          exit 1
        fi
        if [ "$i" -eq 10 ] || [ "$i" -eq 30 ]; then
          echo "Backend container status: ${backend_status:-unknown}"
          docker logs --tail 200 llars_ci_flask_service || true
        fi
        echo "Health check failed ($i/60), retrying in 5s..."
        sleep 5
      done
      if [ "$READY" != "true" ]; then
        echo "Health checks failed after retries."
        docker compose ps
        exit 1
      fi
    - chmod -R a+rwX llars-frontend
    - |
      E2E_SPEC=""
      if [ -n "${E2E_ONLY:-}" ] && [ "${E2E_ONLY}" != "true" ]; then
        case "${E2E_ONLY}" in
          *.spec.*|*.js|*.ts|*/*)
            E2E_SPEC="${E2E_ONLY}"
            ;;
        esac
      fi
      docker run --rm --network "${COMPOSE_PROJECT_NAME}_default" \
        -v "$CI_PROJECT_DIR/llars-frontend:/work" \
        -w /work \
        -e CI=true \
        -e E2E_ONLY="${E2E_ONLY:-}" \
        -e PLAYWRIGHT_BASE_URL="http://${FRONTEND_IP}:5173" \
        -e PLAYWRIGHT_API_BASE_URL="http://${BACKEND_IP}:8081" \
        -e E2E_TEST_PASSWORD="${E2E_TEST_PASSWORD}" \
        -e PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 \
        mcr.microsoft.com/playwright:v1.57.0-jammy \
        bash -lc "npm ci --prefer-offline && npx playwright test --project=chromium --workers=1 ${E2E_SPEC}"
  after_script:
    - docker compose -f docker-compose.yml -f docker-compose.ci.yml --env-file .env down -v || true
    - docker system prune -af --volumes || true
  artifacts:
    when: always
    paths:
      - llars-frontend/playwright-report/
      - llars-frontend/test-results/
    expire_in: 1 week
  rules:
    - when: never
  needs:
    - job: test:integration
      optional: true

# =============================================================================
# STAGE 3: SECURITY
# =============================================================================

security:routes:
  stage: security
  image: python:3.11-slim
  script:
    - pip install pytest
    - pytest tests/security/test_route_security.py -q
  rules:
    - *test_only_skip
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

# =============================================================================
# STAGE 4: BUILD
# =============================================================================

build:docker:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - echo "Building Docker images..."
    - docker compose build --parallel
    - echo "Build completed successfully"
  rules:
    - *test_only_skip
    - if: $CI_COMMIT_BRANCH == "main"

# =============================================================================
# STAGE 5: DEPLOY
# =============================================================================

# ------------------------------------------------------------------------------
# Deploy zu Staging (automatisch bei Push zu develop)
# ------------------------------------------------------------------------------
deploy:staging:
  stage: deploy
  tags:
    - shell  # Runner mit Shell-Executor (direkter Server-Zugriff)
  environment:
    name: staging
    url: http://141.75.150.128
  resource_group: staging
  script:
    - echo "=== LLARS Staging Deployment ==="
    - bash scripts/ci/deploy_staging.sh
  rules:
    - *test_only_skip
    - if: $CI_COMMIT_BRANCH == "develop"

# ------------------------------------------------------------------------------
# Deploy zu Produktion (automatisch bei Push zu main)
# Runner ist auf dem LLARS Server - kein SSH nötig!
# ------------------------------------------------------------------------------
deploy:production:
  stage: deploy
  tags:
    - shell  # Runner mit Shell-Executor (direkter Server-Zugriff)
  environment:
    name: production
    url: http://141.75.150.128
  resource_group: production
  script:
    - echo "=========================================="
    - echo "=== LLARS PRODUCTION DEPLOYMENT ========="
    - echo "=========================================="
    - echo "Timestamp:" $(date)
    - echo "Server:" $(hostname)
    - bash scripts/ci/deploy_production.sh
  rules:
    - *test_only_skip
    - if: $CI_COMMIT_BRANCH == "main"
  when: on_success

# =============================================================================
# STAGE 7: ROLLBACK
# =============================================================================
# Manueller Rollback (für Notfälle)
rollback:production:
  stage: rollback
  tags:
    - shell  # Runner mit Shell-Executor (direkter Server-Zugriff)
  environment:
    name: production
  resource_group: production
  script:
    - echo "=== EMERGENCY ROLLBACK ==="
    - bash scripts/ci/rollback_production.sh
  rules:
    - *test_only_skip
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  allow_failure: true

# =============================================================================
# ZUSÄTZLICHE JOBS
# =============================================================================

# Security Scan (informational - doesn't block pipeline)
security:scan:
  stage: security
  image: python:3.11-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends nodejs npm
  script:
    - pip install pip-audit safety
    - echo "Running security scan..."
    - pip-audit -r app/requirements.txt || echo "⚠️ pip-audit found vulnerabilities"
    - cd llars-frontend && npm audit --audit-level=high || echo "⚠️ npm audit found vulnerabilities"
  rules:
    - *test_only_skip
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
  allow_failure: true  # Security scan is informational, doesn't block deployment

# =============================================================================
# STAGE 6: SMOKE
# =============================================================================
# Smoke Tests nach Deployment (inkl. Wizard-Workflow)
smoke:production:
  stage: smoke
  tags:
    - shell  # Runner mit Shell-Executor (direkter Server-Zugriff)
  environment:
    name: production
  resource_group: production
  script:
    - echo "Running production smoke tests..."
    - bash scripts/ci/smoke_test.sh
  after_script:
    - |
      if [ "$CI_JOB_STATUS" != "success" ]; then
        echo "Smoke tests failed; triggering rollback."
        bash scripts/ci/rollback_production.sh || true
      fi
  rules:
    - *test_only_skip
    - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - deploy:production
  when: on_success

# =============================================================================
# CODE METRICS COLLECTION
# =============================================================================
# Collects and reports code quality metrics (docstrings, coverage, file sizes)

metrics:collect:
  stage: test
  image: python:3.11-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends nodejs npm
  script:
    - echo "📊 Collecting Code Quality Metrics..."
    - pip install pytest pytest-cov
    - python scripts/metrics/collect_python_metrics.py --json > python_metrics.json
    - cd llars-frontend && npm ci --prefer-offline --silent
    - cd .. && node scripts/metrics/collect_frontend_metrics.js --json > frontend_metrics.json
    - echo ""
    - echo "=== PYTHON METRICS ==="
    - python -c "import json; m=json.load(open('python_metrics.json')); s=m['summary']; print('Function Coverage:', str(s['function_coverage'])+'%'); print('Class Coverage:', str(s['class_coverage'])+'%')"
    - echo ""
    - echo "=== FRONTEND METRICS ==="
    - node -e "const m=require('./frontend_metrics.json'); console.log('JSDoc Coverage:', m.summary.coverage+'%')"
  artifacts:
    paths:
      - python_metrics.json
      - frontend_metrics.json
    reports:
      metrics:
        - python_metrics.json
        - frontend_metrics.json
    expire_in: 30 days
  rules:
    - *test_only_skip
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
  allow_failure: true

# Update documentation with metrics (only on main branch)
metrics:update-docs:
  stage: smoke
  tags:
    - shell
  script:
    - echo "📝 Updating documentation with metrics..."
    - cd /var/llars
    - python scripts/metrics/collect_python_metrics.py
    - node scripts/metrics/collect_frontend_metrics.js
    - python scripts/metrics/update_docs.py
    - echo "Metrics documentation updated"
  rules:
    - *test_only_skip
    - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - metrics:collect
    - smoke:production
  when: on_success
  allow_failure: true
