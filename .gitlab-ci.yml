# =============================================================================
# LLARS GitLab CI/CD Pipeline
# =============================================================================
# Vollautomatisierte Pipeline für Test, Build und Deployment
#
# Stages:
#   1. lint      - Code-Qualität prüfen
#   2. test      - Unit & Integration Tests
#   3. build     - Docker Images bauen
#   4. deploy    - Automatisches Deployment via SSH
#
# Voraussetzungen (GitLab CI/CD Variables):
#   - SSH_PRIVATE_KEY: Private Key für SSH Zugang zum Server
#   - SSH_KNOWN_HOSTS: Known Hosts Eintrag des Servers
#   - LLARS_SERVER_HOST: Hostname/IP des LLARS Servers
#   - LLARS_SERVER_USER: SSH Username (default: llars)
#   - LLARS_DEPLOY_PATH: Pfad zum LLARS Projekt auf dem Server
#   - DEPLOY_TOKEN: (Optional) Für private Registry
#
# =============================================================================

stages:
  - lint
  - test
  - build
  - deploy

# =============================================================================
# GLOBALE KONFIGURATION
# =============================================================================

# Optional test-only switches (set one to run only that job)
# - UNIT_BACKEND_ONLY
# - UNIT_FRONTEND_ONLY
# - INTEGRATION_ONLY
# - E2E_ONLY (can be a Playwright spec path to run a single file)

variables:
  # Python
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONUNBUFFERED: "1"

  # Node.js
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"

  # Docker
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_IMAGE_TAG: $CI_COMMIT_SHORT_SHA

  # Deployment (Server: 141.75.150.128)
  LLARS_SERVER_USER: "master"
  LLARS_DEPLOY_PATH: "/var/llars"

# Cache für schnellere Builds
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .cache/pip
    - .cache/npm
    - llars-frontend/node_modules/

# Standard before_script für SSH Setup (Alpine Linux)
.ssh_setup: &ssh_setup
  before_script:
    - 'command -v ssh-agent >/dev/null || apk add --no-cache openssh-client'
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts

# Shared rule to skip non-test jobs when a test-only switch is set
.test_only_skip: &test_only_skip
  if: '$UNIT_BACKEND_ONLY || $UNIT_FRONTEND_ONLY || $INTEGRATION_ONLY || $E2E_ONLY'
  when: never

# =============================================================================
# STAGE 1: LINT
# =============================================================================

lint:backend:
  stage: lint
  image: python:3.11-slim
  script:
    - pip install flake8 black isort
    - echo "Checking Python code style..."
    - flake8 app/
    - black --check app/ --line-length=120 || true
    - isort --check-only app/ || true
  rules:
    - *test_only_skip
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

lint:frontend:
  stage: lint
  image: node:20-alpine
  script:
    - cd llars-frontend
    - npm ci --prefer-offline
    - echo "Checking Frontend code style..."
    - npm run lint || true
  rules:
    - *test_only_skip
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

# =============================================================================
# STAGE 2: TEST
# =============================================================================

test:unit:backend:
  stage: test
  image: python:3.11-slim
  services:
    - name: mariadb:11.2
      alias: test-db
      variables:
        MYSQL_ROOT_PASSWORD: test
        MYSQL_DATABASE: llars_test
        MYSQL_USER: test
        MYSQL_PASSWORD: test
  variables:
    DATABASE_URL: "mysql://test:test@test-db:3306/llars_test"
    TESTING: "true"
    AUTHENTIK_DISABLED: "true"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends build-essential libffi-dev libssl-dev pkg-config
    - pip install --upgrade pip
  script:
    # Use lightweight test requirements (excludes torch/flair/transformers ~3GB)
    - pip install -r app/requirements-test.txt
    - echo "Running Backend Unit Tests..."
    - pytest tests/unit/ -v --cov=app --cov-report=xml --cov-report=term-missing
  coverage: '/TOTAL.*\s+(\d+%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 week
  rules:
    - if: '$UNIT_BACKEND_ONLY'
    - if: '$UNIT_FRONTEND_ONLY || $INTEGRATION_ONLY || $E2E_ONLY'
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

test:unit:frontend:
  stage: test
  image: node:20-alpine
  script:
    - cd llars-frontend
    - npm ci --prefer-offline
    - echo "Running Frontend Unit Tests..."
    - npm run test:run -- --coverage
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: llars-frontend/coverage/cobertura-coverage.xml
    expire_in: 1 week
  rules:
    - if: '$UNIT_FRONTEND_ONLY'
    - if: '$UNIT_BACKEND_ONLY || $INTEGRATION_ONLY || $E2E_ONLY'
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

test:integration:
  stage: test
  image: python:3.11-slim
  services:
    - name: mariadb:11.2
      alias: test-db
      variables:
        MYSQL_ROOT_PASSWORD: test
        MYSQL_DATABASE: llars_test
        MYSQL_USER: test
        MYSQL_PASSWORD: test
    - name: redis:7-alpine
      alias: test-redis
  variables:
    DATABASE_URL: "mysql://test:test@test-db:3306/llars_test"
    REDIS_URL: "redis://test-redis:6379"
    TESTING: "true"
    AUTHENTIK_DISABLED: "true"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends build-essential libffi-dev libssl-dev pkg-config
    - pip install --upgrade pip
  script:
    # Use lightweight test requirements (excludes torch/flair/transformers ~3GB)
    - pip install -r app/requirements-test.txt
    - echo "Running Integration Tests..."
    - pytest tests/integration/ -v
  rules:
    - if: '$INTEGRATION_ONLY'
    - if: '$UNIT_BACKEND_ONLY || $UNIT_FRONTEND_ONLY || $E2E_ONLY'
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - job: test:unit:backend
      optional: true

# E2E Tests laufen gegen eine frische CI-Umgebung (Docker Compose im Job)
# Dies stellt sicher, dass die Tests den aktuellen Code prüfen
test:e2e:
  stage: test
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
    COMPOSE_PROJECT_NAME: "llars-ci"
  script:
    - echo "Running E2E Tests against fresh LLARS instance..."
    - |
      cat > .env <<'EOF'
      PROJECT_STATE=development
      PROJECT_URL=http://nginx-service
      PROJECT_HOST=nginx-service
      NGINX_EXTERNAL_PORT=55080
      AUTHENTIK_EXTERNAL_PORT=55095
      LLARS_ADMIN_PASSWORD=admin123
      AUTHENTIK_BOOTSTRAP_PASSWORD=admin123
      AUTHENTIK_BOOTSTRAP_EMAIL=admin@example.com
      AUTHENTIK_API_TOKEN=llars-dev-api-token-do-not-use-in-production
      EOF
    - export E2E_TEST_PASSWORD="$(awk -F= '/^LLARS_ADMIN_PASSWORD=/{print substr($0,index($0,"=")+1); exit}' .env | tr -d '\r')"
    - docker compose --env-file .env up -d --build nginx-service authentik-init authentik-worker
    - |
      echo "Waiting for Authentik init to complete..."
      for i in $(seq 1 60); do
        status=$(docker inspect -f '{{.State.Status}}' llars_authentik_init 2>/dev/null || true)
        exit_code=$(docker inspect -f '{{.State.ExitCode}}' llars_authentik_init 2>/dev/null || true)
        if [ "$status" = "exited" ] && [ "$exit_code" = "0" ]; then
          echo "Authentik init completed."
          break
        fi
        echo "Authentik init not done yet ($i/60)..."
        sleep 5
      done
      if [ "$status" != "exited" ] || [ "$exit_code" != "0" ]; then
        echo "Authentik init did not complete successfully."
        docker logs llars_authentik_init || true
        exit 1
      fi
    - |
      echo "Waiting for services to be healthy..."
      READY=false
      for i in $(seq 1 60); do
        if docker run --rm --network "${COMPOSE_PROJECT_NAME}_default" --entrypoint sh curlimages/curl:8.10.0 \
          -c "curl -fsS http://nginx-service/health >/dev/null && curl -fsS http://nginx-service/auth/health_check >/dev/null && curl -fsS http://nginx-service/auth/authentik/health_check >/dev/null"; then
          READY=true
          echo "Health checks OK."
          break
        fi
        echo "Health check failed ($i/60), retrying in 5s..."
        sleep 5
      done
      if [ "$READY" != "true" ]; then
        echo "Health checks failed after retries."
        docker compose ps
        exit 1
      fi
    - chmod -R a+rwX llars-frontend
    - |
      E2E_SPEC=""
      if [ -n "${E2E_ONLY:-}" ] && [ "${E2E_ONLY}" != "true" ]; then
        E2E_SPEC="${E2E_ONLY}"
      fi
      docker run --rm --network "${COMPOSE_PROJECT_NAME}_default" \
        -v "$CI_PROJECT_DIR/llars-frontend:/work" \
        -w /work \
        -e CI=true \
        -e PLAYWRIGHT_BASE_URL=http://nginx-service \
        -e E2E_TEST_PASSWORD="${E2E_TEST_PASSWORD}" \
        -e PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 \
        mcr.microsoft.com/playwright:v1.57.0-jammy \
        bash -lc "npm ci --prefer-offline && npx playwright test --project=chromium --workers=1 ${E2E_SPEC}"
  after_script:
    - docker compose --env-file .env down -v || true
  artifacts:
    when: always
    paths:
      - llars-frontend/playwright-report/
      - llars-frontend/test-results/
    expire_in: 1 week
  rules:
    - if: '$E2E_ONLY'
    - if: '$UNIT_BACKEND_ONLY || $UNIT_FRONTEND_ONLY || $INTEGRATION_ONLY'
      when: never
    - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - job: test:integration
      optional: true

# =============================================================================
# STAGE 3: BUILD
# =============================================================================

build:docker:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - echo "Building Docker images..."
    - docker compose build --parallel
    - echo "Build completed successfully"
  rules:
    - *test_only_skip
    - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - test:unit:backend
    - test:unit:frontend

# =============================================================================
# STAGE 4: DEPLOY
# =============================================================================

# ------------------------------------------------------------------------------
# Deploy zu Staging (automatisch bei Push zu develop)
# ------------------------------------------------------------------------------
deploy:staging:
  stage: deploy
  tags:
    - shell  # Runner mit Shell-Executor (direkter Server-Zugriff)
  environment:
    name: staging
    url: http://141.75.150.128
  script:
    - echo "=== LLARS Staging Deployment ==="
    - echo "Timestamp:" $(date)
    - cd /var/llars
    - echo "Pulling latest changes..."
    - git fetch origin develop
    - git checkout develop
    - git pull origin develop
    - echo "Creating quick backup..."
    - docker exec llars_db_service mysqldump -u dev_user -pdev_password_change_me database_llars > backups/staging_backup_$(date +%Y%m%d_%H%M%S).sql 2>/dev/null || true
    - echo "Rebuilding containers..."
    - docker compose build --parallel
    - docker compose up -d
    - echo "Waiting for services to be healthy..."
    - sleep 30
    - curl -sf http://localhost/auth/health_check > /dev/null && echo "✓ API Health OK" || echo "✗ API Health FAILED"
    - echo "=== Staging Deployment Complete ==="
  rules:
    - *test_only_skip
    - if: $CI_COMMIT_BRANCH == "develop"
  needs:
    - build:docker

# ------------------------------------------------------------------------------
# Deploy zu Produktion (automatisch bei Push zu main)
# Runner ist auf dem LLARS Server - kein SSH nötig!
# ------------------------------------------------------------------------------
deploy:production:
  stage: deploy
  tags:
    - shell  # Runner mit Shell-Executor (direkter Server-Zugriff)
  environment:
    name: production
    url: http://141.75.150.128
  script:
    - echo "=========================================="
    - echo "=== LLARS PRODUCTION DEPLOYMENT ========="
    - echo "=========================================="
    - echo "Timestamp:" $(date)
    - echo "Server:" $(hostname)

    - cd /var/llars

    # 1. Pre-Deployment Backup
    - echo ""
    - echo "[1/6] Creating pre-deployment backup..."
    - BACKUP_FILE="backups/pre_deploy_$(date +%Y%m%d_%H%M%S).sql"
    - docker exec llars_db_service mysqldump -u dev_user -pdev_password_change_me database_llars > $BACKUP_FILE || echo "Backup skipped"
    - echo "Backup saved to:" $BACKUP_FILE

    # 2. Git Pull
    - echo ""
    - echo "[2/6] Pulling latest changes from main..."
    - git fetch origin main
    - git checkout main
    - git reset --hard origin/main

    # 3. Environment Check
    - echo ""
    - echo "[3/6] Checking environment..."
    - test -f .env || (echo "ERROR .env not found" && exit 1)

    # 4. Build Images
    - echo ""
    - echo "[4/6] Building Docker images..."
    - docker compose build --parallel

    # 5. Rolling Update
    - echo ""
    - echo "[5/6] Performing rolling update..."
    - docker compose up -d backend-flask-service
    - sleep 10
    - docker compose up -d frontend-vue-service
    - sleep 5
    - docker compose up -d

    # 6. Post-Deployment Verification
    - echo ""
    - echo "[6/6] Verifying deployment..."
    - sleep 30
    - echo "Running health checks..."
    - curl -sf http://localhost/auth/health_check > /dev/null && echo "✓ API Health OK" || echo "✗ API Health FAILED"
    - curl -sf http://localhost/ > /dev/null && echo "✓ Frontend OK" || echo "✗ Frontend FAILED"
    - echo ""
    - docker compose ps
    - echo ""
    - echo "=========================================="
    - echo "=== DEPLOYMENT SUCCESSFUL ==============="
    - echo "=========================================="
  rules:
    - *test_only_skip
    - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - test:e2e
    - build:docker
  when: on_success

# ------------------------------------------------------------------------------
# Manueller Rollback (für Notfälle)
# ------------------------------------------------------------------------------
rollback:production:
  stage: deploy
  tags:
    - shell  # Runner mit Shell-Executor (direkter Server-Zugriff)
  environment:
    name: production
  script:
    - echo "=== EMERGENCY ROLLBACK ==="
    - cd /var/llars
    - LATEST_BACKUP=$(ls -t backups/*.sql 2>/dev/null | head -1)
    - test -n "$LATEST_BACKUP" || (echo "ERROR No backup found" && exit 1)
    - echo "Rolling back to:" $LATEST_BACKUP
    - git checkout HEAD~1
    - docker exec -i llars_db_service mariadb -u dev_user -pdev_password_change_me database_llars < $LATEST_BACKUP
    - docker compose build
    - docker compose up -d
    - echo "=== ROLLBACK COMPLETE ==="
  rules:
    - *test_only_skip
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  allow_failure: true

# =============================================================================
# ZUSÄTZLICHE JOBS
# =============================================================================

# Security Scan (informational - doesn't block pipeline)
security:scan:
  stage: test
  image: python:3.11-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends nodejs npm
  script:
    - pip install pip-audit safety
    - echo "Running security scan..."
    - pip-audit -r app/requirements.txt || echo "⚠️ pip-audit found vulnerabilities"
    - cd llars-frontend && npm audit --audit-level=high || echo "⚠️ npm audit found vulnerabilities"
  rules:
    - *test_only_skip
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  allow_failure: true  # Security scan is informational, doesn't block deployment

# Smoke Test nach Deployment (Basic Health Checks)
smoke:test:
  stage: deploy
  tags:
    - shell  # Runner mit Shell-Executor (direkter Server-Zugriff)
  script:
    - echo "Running basic smoke tests..."
    - echo "Checking API health..."
    - curl -sf http://localhost/auth/health_check || exit 1
    - echo "Checking frontend..."
    - curl -sf http://localhost/ || exit 1
    - echo "Checking auth status..."
    - curl -sf http://localhost/auth/authentik/status || true
    - echo "Basic smoke tests passed!"
  rules:
    - *test_only_skip
    - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - deploy:production
  when: on_success

# Wizard Smoke Test - Testet kompletten Chatbot-Wizard-Workflow
smoke:wizard:
  stage: deploy
  tags:
    - shell
  variables:
    BASE_URL: "http://localhost"
    SYSTEM_ADMIN_API_KEY: "llars-admin-key-change-in-production-12345"
    TEST_URL: "https://example.com"
  script:
    - echo "Running Chatbot Wizard smoke test..."
    - cd /var/llars
    - chmod +x scripts/smoke_test_wizard.sh
    - ./scripts/smoke_test_wizard.sh
  rules:
    - *test_only_skip
    - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - smoke:test
  when: on_success
  allow_failure: true  # Wizard-Test optional, blockiert nicht das Deployment

# =============================================================================
# CODE METRICS COLLECTION
# =============================================================================
# Collects and reports code quality metrics (docstrings, coverage, file sizes)

metrics:collect:
  stage: test
  image: python:3.11-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends nodejs npm
  script:
    - echo "📊 Collecting Code Quality Metrics..."
    - pip install pytest pytest-cov
    - python scripts/metrics/collect_python_metrics.py --json > python_metrics.json
    - cd llars-frontend && npm ci --prefer-offline --silent
    - cd .. && node scripts/metrics/collect_frontend_metrics.js --json > frontend_metrics.json
    - echo ""
    - echo "=== PYTHON METRICS ==="
    - python -c "import json; m=json.load(open('python_metrics.json')); s=m['summary']; print('Function Coverage:', str(s['function_coverage'])+'%'); print('Class Coverage:', str(s['class_coverage'])+'%')"
    - echo ""
    - echo "=== FRONTEND METRICS ==="
    - node -e "const m=require('./frontend_metrics.json'); console.log('JSDoc Coverage:', m.summary.coverage+'%')"
  artifacts:
    paths:
      - python_metrics.json
      - frontend_metrics.json
    reports:
      metrics:
        - python_metrics.json
        - frontend_metrics.json
    expire_in: 30 days
  rules:
    - *test_only_skip
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
  allow_failure: true

# Update documentation with metrics (only on main branch)
metrics:update-docs:
  stage: deploy
  tags:
    - shell
  script:
    - echo "📝 Updating documentation with metrics..."
    - cd /var/llars
    - python scripts/metrics/collect_python_metrics.py
    - node scripts/metrics/collect_frontend_metrics.js
    - python scripts/metrics/update_docs.py
    - echo "Metrics documentation updated"
  rules:
    - *test_only_skip
    - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - metrics:collect
    - deploy:production
  when: on_success
  allow_failure: true
