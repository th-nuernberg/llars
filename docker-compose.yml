services:
  nginx-service:
    container_name: llars_nginx_service
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile-nginx
    ports:
      - "${NGINX_EXTERNAL_PORT}:${NGINX_INTERNAL_PORT}"
    depends_on:
      backend-flask-service:
        condition: service_healthy
      frontend-vue-service:
        condition: service_healthy
    environment:
      - TZ=Europe/Berlin

  backend-flask-service:
    container_name: llars_flask_service
    build:
      context: .
      dockerfile: docker/flask/Dockerfile-flask
    expose:
      - "8081"
    # Mount application code for hot-reloading in development
    volumes:
      - ./app:/app
      - model_volume:/app/storage
    env_file:
      - .env
    environment:
      - TZ=Europe/Berlin
      - FLASK_ENV=${FLASK_ENV}
      - FLASK_APP=/app/main.py
      # CORS origins derived from PROJECT_HOST
      - ALLOWED_ORIGINS=http://${PROJECT_HOST},http://${PROJECT_HOST}:${NGINX_EXTERNAL_PORT},http://${PROJECT_HOST}:${FRONTEND_EXTERNAL_PORT},http://127.0.0.1,http://127.0.0.1:${NGINX_EXTERNAL_PORT},http://127.0.0.1:${FRONTEND_EXTERNAL_PORT}
    depends_on:
      db-maria-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      start_period: 1800s   # 30 Minuten maximale Startzeit
      interval: 10s         # Häufige Checks
      timeout: 10s
      retries: 180         # Viele Retries (entspricht 30min bei 10s Interval)

  frontend-vue-service:
    container_name: llars_frontend_service
    build:
      context: .
      dockerfile: docker/vue/Dockerfile-vue
    expose:
      - "5173"
    # Mount frontend code for hot-reloading in development
    volumes:
      - ./llars-frontend:/vue
    environment:
      - TZ=Europe/Berlin
      # All URLs derived from PROJECT_HOST
      - VITE_API_BASE_URL=http://${PROJECT_HOST}:${NGINX_EXTERNAL_PORT}
      - VITE_PROJECT_STATE=${PROJECT_STATE}
      - VITE_MKDOCS_URL=http://${PROJECT_HOST}:${MKDOCS_EXTERNAL_PORT}
      - VITE_KEYCLOAK_URL=http://${PROJECT_HOST}:${NGINX_EXTERNAL_PORT}/authentik
      - VITE_KEYCLOAK_REALM=llars   # legacy variable; Authentik uses apps, not realms
      - VITE_KEYCLOAK_CLIENT_ID=${AUTHENTIK_FRONTEND_CLIENT_ID}
    develop:
      watch:
        - action: sync
          path: ./llars-frontend/src
          target: /vue/src
          ignore:
            - node_modules/
    depends_on:
      backend-supervisor-service:
        condition: service_started
    healthcheck:
      test: [ "CMD", "/usr/local/bin/healthcheck.sh" ]
      start_period: 2s
      interval: 5s
      timeout: 5s
      retries: 5

  backend-supervisor-service:
    container_name: llars_supervisor_service
    build:
      context: .
      dockerfile: docker/supervisor/Dockerfile-supervisor
    command: [ "/supervisor/start_supervisor.sh" ]
    env_file:
      - .env
    environment:
      - TZ=Europe/Berlin
    depends_on:
      - backend-flask-service
      - db-maria-service

  db-maria-service:
    container_name: llars_db_service
    build:
      context: .
      dockerfile: docker/db/Dockerfile-mariadb
    env_file:
      - .env
    ports:
      - "${DB_EXTERNAL_PORT}:${DB_INTERNAL_PORT}"
    volumes:
      - llarsdb:/var/lib/mysql
    environment:
      - TZ=Europe/Berlin
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      start_period: 20s
      interval: 5s
      timeout: 5s
      retries: 5

  yjs-service:
    container_name: llars_yjs_service
    build:
      context: .
      dockerfile: docker/yjs-server/Dockerfile-yjs
    environment:
      - TZ=Europe/Berlin
      # Derived from PROJECT_HOST
      - BASE_URL=http://${PROJECT_HOST}:${NGINX_EXTERNAL_PORT}
      - PORT=8082
      - MYSQL_HOST=db-maria-service
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - AUTHENTIK_ISSUER_URL=${AUTHENTIK_ISSUER_URL}
    develop:
      watch:
        - action: sync
          path: ./yjs-server
          target: /yjs-server
          ignore:
            - node_modules/
    depends_on:
      - db-maria-service
      - authentik-server

  authentik-server:
    container_name: llars_authentik_server
    image: ghcr.io/goauthentik/server:latest
    command: server
    environment:
      - AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY}
      - AUTHENTIK_POSTGRESql__HOST=authentik-db
      - AUTHENTIK_POSTGRESql__USER=${AUTHENTIK_DB_USER}
      - AUTHENTIK_POSTGRESql__NAME=${AUTHENTIK_DB_NAME}
      - AUTHENTIK_POSTGRESql__PASSWORD=${AUTHENTIK_DB_PASSWORD}
      - AUTHENTIK_REDIS__HOST=authentik-redis
      - AUTHENTIK_LISTEN__PORT=${AUTHENTIK_INTERNAL_PORT}
      - AUTHENTIK_LISTEN__TRUSTED_PROXY_CIDRS=0.0.0.0/0,::/0
      - AUTHENTIK_ERROR_REPORTING__ENABLED=false
      - AUTHENTIK_BOOTSTRAP_EMAIL=${AUTHENTIK_BOOTSTRAP_EMAIL}
      - AUTHENTIK_BOOTSTRAP_PASSWORD=${AUTHENTIK_BOOTSTRAP_PASSWORD}
    ports:
      - "${AUTHENTIK_EXTERNAL_PORT}:${AUTHENTIK_INTERNAL_PORT}"
    depends_on:
      authentik-db:
        condition: service_healthy
      authentik-redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:${AUTHENTIK_INTERNAL_PORT}/-/health/ready').status==200 else 1)\""]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - authentik_media:/media

  authentik-worker:
    container_name: llars_authentik_worker
    image: ghcr.io/goauthentik/server:latest
    command: worker
    environment:
      - AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY}
      - AUTHENTIK_POSTGRESql__HOST=authentik-db
      - AUTHENTIK_POSTGRESql__USER=${AUTHENTIK_DB_USER}
      - AUTHENTIK_POSTGRESql__NAME=${AUTHENTIK_DB_NAME}
      - AUTHENTIK_POSTGRESql__PASSWORD=${AUTHENTIK_DB_PASSWORD}
      - AUTHENTIK_REDIS__HOST=authentik-redis
      - AUTHENTIK_LISTEN__PORT=${AUTHENTIK_INTERNAL_PORT}
    depends_on:
      authentik-db:
        condition: service_healthy
      authentik-redis:
        condition: service_started
    volumes:
      - authentik_media:/media

  authentik-db:
    container_name: llars_authentik_db
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${AUTHENTIK_DB_NAME}
      - POSTGRES_USER=${AUTHENTIK_DB_USER}
      - POSTGRES_PASSWORD=${AUTHENTIK_DB_PASSWORD}
    volumes:
      - authentikdb:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTHENTIK_DB_USER}"]
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 5

  authentik-redis:
    container_name: llars_authentik_redis
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  authentik-init:
    container_name: llars_authentik_init
    image: python:3.12-slim
    environment:
      - AUTHENTIK_URL=http://authentik-server:9000
      - AUTHENTIK_BOOTSTRAP_EMAIL=${AUTHENTIK_BOOTSTRAP_EMAIL}
      - AUTHENTIK_BOOTSTRAP_PASSWORD=${AUTHENTIK_BOOTSTRAP_PASSWORD}
      - AUTHENTIK_FRONTEND_CLIENT_ID=${AUTHENTIK_FRONTEND_CLIENT_ID}
      - AUTHENTIK_BACKEND_CLIENT_ID=${AUTHENTIK_BACKEND_CLIENT_ID}
      - AUTHENTIK_BACKEND_CLIENT_SECRET=${AUTHENTIK_BACKEND_CLIENT_SECRET}
      - BASE_URL=http://${PROJECT_HOST}:${NGINX_EXTERNAL_PORT}
    volumes:
      - ./docker/authentik/init-authentik.py:/init-authentik.py:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    working_dir: /
    command: >
      sh -c "
      pip install --quiet requests &&
      apt-get update -qq && apt-get install -y -qq docker.io > /dev/null 2>&1 &&
      python3 /init-authentik.py
      "
    depends_on:
      authentik-server:
        condition: service_healthy
    restart: "no"


volumes:
  llarsdb:
  model_volume:
  authentikdb:
  authentik_media:
