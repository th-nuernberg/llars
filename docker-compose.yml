services:
  nginx-service:
    container_name: llars_nginx_service
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile-nginx
    ports:
      - "${NGINX_EXTERNAL_PORT}:80"
    depends_on:
      backend-flask-service:
        condition: service_healthy
      frontend-vue-service:
        condition: service_healthy
    environment:
      - TZ=Europe/Berlin

  backend-flask-service:
    container_name: llars_flask_service
    build:
      context: .
      dockerfile: docker/flask/Dockerfile-flask
    expose:
      - "${FLASK_INTERNAL_PORT}"
    ports:
      - "${FLASK_EXTERNAL_PORT}:${FLASK_INTERNAL_PORT}"
    # Mount application code for hot-reloading in development
    volumes:
      - ./app:/app
      - model_volume:/app/storage
    env_file:
      - .env
    environment:
      - TZ=Europe/Berlin
      - FLASK_ENV=${FLASK_ENV}
      - FLASK_APP=/app/main.py
      - KEYCLOAK_URL=${KEYCLOAK_URL}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_BACKEND_CLIENT_ID}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_BACKEND_CLIENT_SECRET}
    depends_on:
      db-maria-service:
        condition: service_healthy
      keycloak-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      start_period: 1800s   # 30 Minuten maximale Startzeit
      interval: 10s         # Häufige Checks
      timeout: 10s
      retries: 180         # Viele Retries (entspricht 30min bei 10s Interval)

  frontend-vue-service:
    container_name: llars_frontend_service
    build:
      context: .
      dockerfile: docker/vue/Dockerfile-vue
    expose:
      - "${FRONTEND_INTERNAL_PORT}"
    ports:
      - "${FRONTEND_EXTERNAL_PORT}:${FRONTEND_INTERNAL_PORT}"
    # Mount frontend code for hot-reloading in development
    volumes:
      - ./llars-frontend:/vue
    environment:
      - TZ=Europe/Berlin
      - VITE_API_BASE_URL=${BASE_URL}
      - VITE_PROJECT_STATE=${PROJECT_STATE}
      - VITE_KEYCLOAK_URL=${KEYCLOAK_EXTERNAL_URL}
      - VITE_KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - VITE_KEYCLOAK_CLIENT_ID=${KEYCLOAK_FRONTEND_CLIENT_ID}
    develop:
      watch:
        - action: sync
          path: ./llars-frontend/src
          target: /vue/src
          ignore:
            - node_modules/
    depends_on:
      - backend-supervisor-service
      - keycloak-service
    healthcheck:
      test: [ "CMD", "/usr/local/bin/healthcheck.sh" ]
      start_period: 2s
      interval: 5s
      timeout: 5s
      retries: 5

  backend-supervisor-service:
    container_name: llars_supervisor_service
    build:
      context: .
      dockerfile: docker/supervisor/Dockerfile-supervisor
    command: [ "/supervisor/start_supervisor.sh" ]
    env_file:
      - .env
    environment:
      - TZ=Europe/Berlin
    depends_on:
      - backend-flask-service
      - db-maria-service

  db-maria-service:
    container_name: llars_db_service
    build:
      context: .
      dockerfile: docker/db/Dockerfile-mariadb
    env_file:
      - .env
    expose:
      - "${DB_INTERNAL_PORT}"
    ports:
      - "${DB_EXTERNAL_PORT}:${DB_INTERNAL_PORT}"
    volumes:
      - llarsdb:/var/lib/mysql
    environment:
      - TZ=Europe/Berlin
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      start_period: 20s
      interval: 5s
      timeout: 5s
      retries: 5

  yjs-service:
    container_name: llars_yjs_service
    build:
      context: .
      dockerfile: docker/yjs-server/Dockerfile-yjs
    expose:
      - "${YJS_INTERNAL_PORT}"
    ports:
      - "${YJS_EXTERNAL_PORT}:${YJS_INTERNAL_PORT}"
    environment:
      - TZ=Europe/Berlin
      - BASE_URL=${BASE_URL}
      - PORT=${YJS_INTERNAL_PORT}
      - MYSQL_HOST=db-maria-service
      - MYSQL_PORT=${DB_INTERNAL_PORT}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - KEYCLOAK_URL=${KEYCLOAK_URL}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
    develop:
      watch:
        - action: sync
          path: ./yjs-server
          target: /yjs-server
          ignore:
            - node_modules/
    depends_on:
      - db-maria-service
      - keycloak-service

  keycloak-db-service:
    container_name: llars_keycloak_db_service
    image: postgres:16-alpine
    expose:
      - "${KEYCLOAK_DB_INTERNAL_PORT}"
    environment:
      - POSTGRES_DB=${KEYCLOAK_DB_NAME}
      - POSTGRES_USER=${KEYCLOAK_DB_USER}
      - POSTGRES_PASSWORD=${KEYCLOAK_DB_PASSWORD}
      - TZ=Europe/Berlin
    volumes:
      - keycloakdb:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER}"]
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 5

  mkdocs-service:
    container_name: llars_mkdocs_service
    build:
      context: .
      dockerfile: docker/mkdocs/Dockerfile-mkdocs
    expose:
      - "8000"
    ports:
      - "${MKDOCS_EXTERNAL_PORT}:8000"
    volumes:
      - ./docs:/docs
    environment:
      - TZ=Europe/Berlin

  keycloak-service:
    container_name: llars_keycloak_service
    build:
      context: .
      dockerfile: docker/keycloak/Dockerfile-keycloak
    environment:
      - TZ=Europe/Berlin
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db-service:${KEYCLOAK_DB_INTERNAL_PORT}/${KEYCLOAK_DB_NAME}
      - KC_DB_USERNAME=${KEYCLOAK_DB_USER}
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD}
      # Keycloak 26: Use KC_BOOTSTRAP_ADMIN_* instead of KEYCLOAK_ADMIN_*
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KEYCLOAK_ADMIN_USER}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_HOSTNAME=${KEYCLOAK_HOSTNAME}
      - KC_HOSTNAME_STRICT=false
      - KC_HTTP_ENABLED=true
      # Keycloak 26: Replace KC_PROXY=edge with new proxy options
      - KC_PROXY_HEADERS=xforwarded
    expose:
      - "${KEYCLOAK_INTERNAL_PORT}"
    ports:
      - "${KEYCLOAK_EXTERNAL_PORT}:${KEYCLOAK_INTERNAL_PORT}"
    depends_on:
      keycloak-db-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/${KEYCLOAK_INTERNAL_PORT} && echo -e 'GET /realms/llars HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q 'HTTP/1.1 200' <&3"]
      start_period: 60s
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ./docker/keycloak/realm-import.json:/opt/keycloak/data/import/realm-import.json
    command:
      - start-dev
      - --import-realm


volumes:
  llarsdb:
  model_volume:
  keycloakdb: