services:
  nginx-service:
    container_name: llars_nginx_service
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile-nginx
    ports:
      - "${NGINX_EXTERNAL_PORT}:${NGINX_INTERNAL_PORT}"
    depends_on:
      backend-flask-service:
        condition: service_healthy
      frontend-vue-service:
        condition: service_healthy
    environment:
      - TZ=Europe/Berlin

  backend-flask-service:
    container_name: llars_flask_service
    build:
      context: .
      dockerfile: docker/flask/Dockerfile-flask
    expose:
      - "8081"
    # Mount application code for hot-reloading in development
    volumes:
      - ./app:/app
      - model_volume:/app/storage
    env_file:
      - .env
    environment:
      - TZ=Europe/Berlin
      - FLASK_ENV=${FLASK_ENV}
      - FLASK_APP=/app/main.py
      # CORS origins derived from PROJECT_HOST
      - ALLOWED_ORIGINS=http://${PROJECT_HOST},http://${PROJECT_HOST}:${NGINX_EXTERNAL_PORT},http://${PROJECT_HOST}:${FRONTEND_EXTERNAL_PORT},http://127.0.0.1,http://127.0.0.1:${NGINX_EXTERNAL_PORT},http://127.0.0.1:${FRONTEND_EXTERNAL_PORT}
    depends_on:
      db-maria-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      start_period: 1800s   # 30 Minuten maximale Startzeit
      interval: 10s         # Häufige Checks
      timeout: 10s
      retries: 180         # Viele Retries (entspricht 30min bei 10s Interval)

  frontend-vue-service:
    container_name: llars_frontend_service
    build:
      context: .
      dockerfile: docker/vue/Dockerfile-vue
    expose:
      - "5173"
    # Mount frontend code for hot-reloading in development
    volumes:
      - ./llars-frontend:/vue
    environment:
      - TZ=Europe/Berlin
      # All URLs derived from PROJECT_HOST
      - VITE_API_BASE_URL=http://${PROJECT_HOST}:${NGINX_EXTERNAL_PORT}
      - VITE_PROJECT_STATE=${PROJECT_STATE}
      - VITE_MKDOCS_URL=http://${PROJECT_HOST}:${MKDOCS_EXTERNAL_PORT}
    develop:
      watch:
        - action: sync
          path: ./llars-frontend/src
          target: /vue/src
          ignore:
            - node_modules/
    depends_on:
      - backend-supervisor-service
    healthcheck:
      test: [ "CMD", "/usr/local/bin/healthcheck.sh" ]
      start_period: 2s
      interval: 5s
      timeout: 5s
      retries: 5

  backend-supervisor-service:
    container_name: llars_supervisor_service
    build:
      context: .
      dockerfile: docker/supervisor/Dockerfile-supervisor
    command: [ "/supervisor/start_supervisor.sh" ]
    env_file:
      - .env
    environment:
      - TZ=Europe/Berlin
    depends_on:
      - backend-flask-service
      - db-maria-service

  db-maria-service:
    container_name: llars_db_service
    build:
      context: .
      dockerfile: docker/db/Dockerfile-mariadb
    env_file:
      - .env
    ports:
      - "${DB_EXTERNAL_PORT}:${DB_INTERNAL_PORT}"
    volumes:
      - llarsdb:/var/lib/mysql
    environment:
      - TZ=Europe/Berlin
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      start_period: 20s
      interval: 5s
      timeout: 5s
      retries: 5

  yjs-service:
    container_name: llars_yjs_service
    build:
      context: .
      dockerfile: docker/yjs-server/Dockerfile-yjs
    environment:
      - TZ=Europe/Berlin
      # Derived from PROJECT_HOST
      - BASE_URL=http://${PROJECT_HOST}:${NGINX_EXTERNAL_PORT}
      - PORT=8082
      - MYSQL_HOST=db-maria-service
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    develop:
      watch:
        - action: sync
          path: ./yjs-server
          target: /yjs-server
          ignore:
            - node_modules/
    depends_on:
      - db-maria-service


volumes:
  llarsdb:
  model_volume: