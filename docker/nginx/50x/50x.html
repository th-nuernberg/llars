<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Temporarily Unavailable - LLars Plattform</title>
    <link rel="stylesheet" href="50x.css">
</head>
<body>
    <div class="app-bar">
        <div class="nav-icon"></div>
        <div class="toolbar-title" onclick="goHome()">

                <img src="assets/llars-logo.png" alt="Logo" class="logo-image" height="26">
                <span class="toolbar-text">LLars Plattform</span>
            </div>
        </div>
        <div class="spacer"></div>
    </div>

    <div class="paint-strokes">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>

    <div class="main-content" role="main">
        <div class="error-container">
            <h1 id="service-temporarily-unavailable" class="title">Service Temporarily Unavailable</h1>
            <div class="loader">
                <div class="spinner"></div>
            </div>

    </div>

    <div class="footer">
        <div class="footer-content">
            <span class="copyright">©</span>
            <span>LLars Plattform</span>
            <div class="footer-links">
                <span class="footer-link" onclick="navigateTo('Impressum')">Impressum</span>

                <span class="footer-link" onclick="navigateTo('Kontakt')">Kontakt</span>
            </div>

</html>
