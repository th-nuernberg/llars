events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Add missing MIME types for modern JS modules
    # Required for PDF.js worker and other ES modules
    types {
        application/javascript mjs;
    }

    # Allow large file uploads (100MB)
    client_max_body_size 100M;

    # Docker DNS resolver - allows dynamic upstream resolution
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    upstream frontend {
        server frontend-vue-service:5173;
    }

    upstream backend {
        server backend-flask-service:8081;
    }

    upstream yjs {
        server yjs-service:8082;
    }

    upstream authentik {
        server authentik-server:9000;
    }

    upstream mkdocs {
        server mkdocs-service:8000;
    }

    upstream matomo {
        server matomo-service:80;
    }

    # External port as seen by the browser (important when Docker maps :80 -> :55080 in dev)
    map $http_host $llars_forwarded_port {
        default $server_port;
        "~:(?<port>\\d+)$" $port;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        absolute_redirect off;

        # Static files location
        location /50x-assets {
            root /usr/share/nginx/html;
        }

        # Error page setup
        error_page 502 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }

        # WebSocket endpoint for Flask-SocketIO
        location /socket.io/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;

            # WebSocket specific timeouts
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;

            # Disable buffering for real-time updates
            proxy_buffering off;
        }

        # Frontend Service
        location / {
            # Disable buffering for hot-reload (HMR/SSE)
            proxy_buffering off;
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Backend API Service
        # SSE: Anonymize streaming (no buffering + long-lived connection)
        location = /api/anonymize/pseudonymize/stream {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header Authorization;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # SSE: System Monitor (no buffering + long-lived connection)
        location = /api/admin/system/events/stream {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header Authorization;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 7d;
            proxy_send_timeout 7d;
        }

        # SSE: AI Scenario Analysis Stream (no buffering + long timeout for LLM)
        location = /api/ai-assist/analyze-scenario-data/stream {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header Authorization;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # SSE: AI Import Chat Stream (no buffering + long timeout for LLM)
        location = /api/import/ai/chat-stream {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header Authorization;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # LLM: LaTeX Comment AI Resolve (long timeout for LLM processing)
        location ~ ^/api/latex-collab/comments/\d+/ai-resolve$ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header Authorization;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 60s;
        }

        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header Authorization;
        }

        # Backend Auth Service
        location /auth/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header Authorization;
        }

        # Authentik UI/API (proxy)
        location /authentik/ {
            proxy_pass http://authentik/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # WebSocket endpoint für YJS
        location /collab/socket.io/ {
            proxy_pass http://yjs/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Yjs Service
        location /collab/ {
            proxy_pass http://yjs/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Legacy Documentation Hub -> MkDocs (English)
        location = /docs {
            return 301 /mkdocs/en/;
        }
        location = /docs/ {
            return 301 /mkdocs/en/;
        }
        location ~ ^/docs/(en/)?(.*)$ {
            return 301 /mkdocs/en/$2;
        }

        # MkDocs Documentation (served under /mkdocs/ - English default)
        location = /mkdocs {
            return 301 /mkdocs/en/;
        }
        location ~ ^/mkdocs/(?!en/|assets(?:/|$))(.*)$ {
            return 301 /mkdocs/en/$1;
        }

        location /mkdocs/ {
            proxy_pass http://mkdocs/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # WebSocket support for hot-reload
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_cache_bypass $http_upgrade;
            # Rewrite redirects
            proxy_redirect / /mkdocs/en/;
            # Disable buffering for live-reload
            proxy_buffering off;
        }

        # Matomo Analytics
        location /analytics {
            rewrite ^/analytics$ /analytics/ permanent;
        }

        location /analytics/ {
            proxy_pass http://matomo/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port $llars_forwarded_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Uri /analytics;
            proxy_redirect / /analytics/;
            proxy_buffering off;
        }

        # First-party tracking endpoints (less likely to be blocked by content blockers)
        location = /metrics.js {
            proxy_pass http://matomo/matomo.js;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port $llars_forwarded_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        location = /metrics.php {
            proxy_pass http://matomo/matomo.php;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port $llars_forwarded_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        location /matomo {
            rewrite ^/matomo$ /matomo/ permanent;
        }

        location /matomo/ {
            proxy_pass http://matomo/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port $llars_forwarded_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Uri /matomo;
            proxy_redirect / /matomo/;
            proxy_buffering off;
        }

        # Health Check (for Docker healthcheck and load balancers)
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
