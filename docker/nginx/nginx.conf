events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Docker DNS resolver - allows dynamic upstream resolution
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    upstream frontend {
        server frontend-vue-service:5173;
    }

    upstream backend {
        server backend-flask-service:8081;
    }

    upstream yjs {
        server yjs-service:8082;
    }

    upstream authentik {
        server authentik-server:9000;
    }

    upstream mkdocs {
        server mkdocs-service:8000;
    }

    upstream matomo {
        server matomo-service:80;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;

        # Static files location
        location /50x-assets {
            root /usr/share/nginx/html;
        }

        # Error page setup
        error_page 502 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }

        # WebSocket endpoint for Flask-SocketIO
        location /socket.io/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;

            # WebSocket specific timeouts
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;

            # Disable buffering for real-time updates
            proxy_buffering off;
        }

        # Frontend Service
        location / {
            # Disable buffering for hot-reload (HMR/SSE)
            proxy_buffering off;
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Backend API Service
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header Authorization;
        }

        # Backend Auth Service
        location /auth/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header Authorization;
        }

        # Authentik UI/API (proxy)
        location /authentik/ {
            proxy_pass http://authentik/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # WebSocket endpoint für YJS
        location /collab/socket.io/ {
            proxy_pass http://yjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Yjs Service
        location /collab/ {
            proxy_pass http://yjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # MkDocs Documentation
        location /mkdocs {
            rewrite ^/mkdocs$ /mkdocs/ permanent;
        }

        location /mkdocs/ {
            proxy_pass http://mkdocs/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # WebSocket support for hot-reload
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_cache_bypass $http_upgrade;
            # Rewrite redirects
            proxy_redirect / /mkdocs/;
            # Disable buffering for live-reload
            proxy_buffering off;
        }

        # Matomo Analytics
        location /matomo {
            rewrite ^/matomo$ /matomo/ permanent;
        }

        location /matomo/ {
            proxy_pass http://matomo/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Uri /matomo;
            proxy_redirect / /matomo/;
            proxy_buffering off;
        }
    }
}
