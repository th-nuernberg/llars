site_name: LLARS Dokumentation
site_description: Dokumentation für das LLARS (LLM Assisted Research System)
site_author: LLARS Team
dev_addr: 0.0.0.0:8000
use_directory_urls: true

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.highlight
    - search.share
    - content.code.copy

nav:
  - Startseite: index.md
  - Einstieg:
      - Übersicht: getting-started/overview.md
      - Installation: getting-started/installation.md
      - Konfiguration: getting-started/configuration.md
  - Anleitungen:
      - Übersicht: guides/index.md
      - Szenario Wizard: guides/scenario-wizard.md
      - Szenario Manager: guides/scenario-manager.md
      - Evaluation: guides/evaluation.md
      - Prompt Engineering: guides/prompt-engineering.md
      - Batch Generation: guides/batch-generation.md
      - Chatbot Wizard: guides/chatbot-wizard.md
      - LaTeX Collaboration: guides/latex-collaboration.md
      - Admin Dashboard: guides/admin-dashboard.md
      - Schnellstart: guides/quick-start.md
      - Authentik Setup: guides/authentik-setup.md
      - Login Anleitung: guides/login-anleitung.md
      - Projektstatus: guides/project-state.md
      - Berechtigungssystem: guides/permission-system.md
  - Projekte:
      - Übersicht: projekte/index.md
      - How-To: projekte/how-to-project.md
      - LLM Evaluators:
          - Übersicht: projekte/llm-as-judge/index.md
          - Konzept: projekte/llm-as-judge/konzept.md
          - Comparison Modes: projekte/llm-as-judge/comparison-modes-konzept.md
          - Sampling Strategien: projekte/llm-as-judge/sampling-strategien.md
      - OnCoCo Analyse:
          - Übersicht: projekte/oncoco/index.md
          - Konzept: projekte/oncoco/konzept.md
      - Chatbot & RAG:
          - Übersicht: projekte/chatbot-builder/index.md
          - Konzept: projekte/chatbot-builder/konzept.md
          - Hybrid Search: projekte/chatbot-builder/hybrid-search.md
      - KAIMo:
          - Übersicht: projekte/kaimo/index.md
          - Anfrage-Einschätzung: projekte/kaimo/anfrage-einschaetzung.md
          - Integration Konzept: projekte/kaimo/integration-konzept.md
      - Authentik:
          - Übersicht: projekte/authentik/index.md
          - Überblick: projekte/authentik/overview.md
          - Migration: projekte/authentik/migration.md
          - Testplan: projekte/authentik/testing-plan.md
      - Data Importer:
          - Übersicht: projekte/data-importer/index.md
          - Konzept: projekte/data-importer/konzept.md
      - Splitting & Refactoring:
          - Konzept: projekte/splitting-refactoring/konzept.md
          - Umsetzung: projekte/splitting-refactoring/umsetzung.md
          - Fortschritt: projekte/splitting-refactoring/progress.md
      - Templates:
          - Konzept: projekte/templates/konzept-template.md
          - Umsetzung: projekte/templates/umsetzung-template.md
          - Fortschritt: projekte/templates/progress-template.md
  - Agentic AI & RAG:
      - Übersicht: agentic-ai/index.md
      - RAG: agentic-ai/rag.md
      - ACT: agentic-ai/act.md
      - ReACT: agentic-ai/react.md
      - ReflAct: agentic-ai/reflact.md
  - Entwickler:
      - Rating/Ranking Checklist: entwickler/rating-ranking-checklist.md
      - Rating/Ranking Übersicht: entwickler/rating-ranking-overview.md
      - API-Referenz: entwickler/api-referenz.md
      - Frontend-Komponenten: entwickler/frontend-komponenten.md
      - Evaluation Datenformate: entwickler/evaluation-datenformate.md
      - WebSocket API: entwickler/websocket-api.md
      - Collaboration System: entwickler/collab-system.md
      - Datenbank-Schema: entwickler/datenbank-schema.md
      - Admin-Panel: entwickler/admin-panel.md
      - Code-Qualität: entwickler/code-qualitaet.md
      - Production Deployment: entwickler/production-deployment.md
  - Archiv:
      - Übersicht: archive/index.md
      - Legacy-Konzepte:
          - Evaluationsassistent: archive/legacy-concepts/EvaluationsassistentKonzept.md
          - LLM Evaluator: archive/legacy-concepts/LLMEvaluatorKonzept.md
          - Ranking Redesign: archive/legacy-concepts/ranking-redesign-concept.md
          - Scenario Wizard (Legacy): archive/legacy-concepts/scenario-wizard.md
      - AI Writing Assistant: archive/AI_WRITING_ASSISTANT_KONZEPT.md
      - Refactoring (Complete): archive/refactoring-complete.md
      - Refactoring (Scenarios): archive/refactoring-scenarios.md
      - Session 2025-11-20: archive/session-2025-11-20.md
      - Arbeitszusammenfassung: archive/work-summary.md
      - Testbericht: archive/testing-report.md
      - Keycloak (Archiv): archive/keycloak-integration.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - i18n:
      languages:
        - locale: de
          default: true
          name: Deutsch
          build: true
        - locale: en
          name: English
          build: true
      nav_translations:
        en:
          Startseite: Home
          Einstieg: Getting Started
          Anleitungen: Guides
          Schnellstart: Quick Start
          Login Anleitung: Login Guide
          Konfiguration: Configuration
          Installation: Installation
          Übersicht: Overview
          Projektstatus: Project State
          Berechtigungssystem: Permission System
          Szenario Wizard: Scenario Wizard
          Szenario Manager: Scenario Manager
          Authentik Setup: Authentik Setup
          Projekte: Projects
          Entwickler: Developer
          Archiv: Archive
          Agentic AI & RAG: Agentic AI & RAG
          Rating/Ranking Checklist: Rating/Ranking Checklist
          Rating/Ranking Übersicht: Rating/Ranking Overview
          API-Referenz: API Reference
          Frontend-Komponenten: Frontend Components
          Evaluation Datenformate: Evaluation Data Formats
          WebSocket API: WebSocket API
          Collaboration System: Collaboration System
          Datenbank-Schema: Database Schema
          Admin-Panel: Admin Panel
          Code-Qualität: Code Quality
          Production Deployment: Production Deployment

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js
