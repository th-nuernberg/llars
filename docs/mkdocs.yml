site_name: LLARS Documentation
site_description: Documentation for the LLARS (LLM-Assisted Rating System) Platform
site_author: LLARS Team
dev_addr: 0.0.0.0:8000
use_directory_urls: true

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.highlight
    - search.share
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
      - Übersicht: getting-started/overview.md
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
  - Guides:
      - Übersicht: guides/index.md
      - Quick Start: guides/quick-start.md
      - Authentik Setup: guides/authentik-setup.md
      - Login Anleitung: guides/login-anleitung.md
      - Project State: guides/project-state.md
      - Permission System: guides/permission-system.md
  - Projekte:
      - Übersicht: projekte/index.md
      - How-To: projekte/how-to-project.md
      - LLM-as-Judge:
          - Übersicht: projekte/llm-as-judge/index.md
          - Konzept: projekte/llm-as-judge/konzept.md
          - Comparison Modes: projekte/llm-as-judge/comparison-modes-konzept.md
          - Sampling Strategien: projekte/llm-as-judge/sampling-strategien.md
      - OnCoCo Analyse:
          - Übersicht: projekte/oncoco/index.md
          - Konzept: projekte/oncoco/konzept.md
      - Chatbot & RAG:
          - Übersicht: projekte/chatbot-rag/index.md
          - Konzept: projekte/chatbot-rag/konzept.md
      - KAIMo:
          - Übersicht: projekte/kaimo/index.md
          - Anfrage-Einschätzung: projekte/kaimo/anfrage-einschaetzung.md
          - Integration Konzept: projekte/kaimo/integration-konzept.md
      - Authentik:
          - Übersicht: projekte/authentik/index.md
          - Overview: projekte/authentik/overview.md
          - Migration: projekte/authentik/migration.md
          - Testing Plan: projekte/authentik/testing-plan.md
      - Templates:
          - Konzept: projekte/templates/konzept-template.md
          - Umsetzung: projekte/templates/umsetzung-template.md
          - Progress: projekte/templates/progress-template.md
  - Archiv:
      - Übersicht: archive/index.md
      - Refactoring Complete: archive/refactoring-complete.md
      - Refactoring Scenarios: archive/refactoring-scenarios.md
      - Session 2025-11-20: archive/session-2025-11-20.md
      - Work Summary: archive/work-summary.md
      - Testing Report: archive/testing-report.md
      - Keycloak Integration: archive/keycloak-integration.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mermaid2
